<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIK - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #667eea; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .role-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .role-btn {
            flex: 1;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-btn.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .role-icon { font-size: 32px; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .vendeur-form, .gerant-form { display: none; }
        .vendeur-form.show, .gerant-form.show { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🏪</div>
        <h1>UNIK Boutik</h1>
        <div class="subtitle">Gestion de stock professionnelle</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="role-buttons">
            <div class="role-btn" onclick="selectRole('vendeur')" id="roleVendeurBtn">
                <div class="role-icon">💰</div>
                <div>Vendeur / Caisse</div>
            </div>
            <div class="role-btn" onclick="selectRole('gerant')" id="roleGerantBtn">
                <div class="role-icon">👑</div>
                <div>Gerant / Responsable</div>
            </div>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div id="vendeurForm" class="vendeur-form">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" name="username" placeholder="Ex: Test, Esther, Shalom">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password_vendeur">
                </div>
            </div>

            <div id="gerantForm" class="gerant-form">
                <div class="form-group">
                    <label>Mot de passe gerant</label>
                    <input type="password" name="password_gerant" placeholder="Mot de passe gerant">
                </div>
            </div>

            <input type="hidden" name="role" id="roleField" value="vendeur">
            <button type="submit">Se connecter</button>
        </form>
    </div>

    <script>
        let currentRole = 'vendeur';

        function selectRole(role) {
            currentRole = role;
            document.getElementById('roleVendeurBtn').classList.remove('selected');
            document.getElementById('roleGerantBtn').classList.remove('selected');
            document.getElementById(role === 'vendeur' ? 'roleVendeurBtn' : 'roleGerantBtn').classList.add('selected');

            if (role === 'vendeur') {
                document.getElementById('vendeurForm').classList.add('show');
                document.getElementById('gerantForm').classList.remove('show');
                document.getElementById('roleField').value = 'vendeur';
            } else {
                document.getElementById('vendeurForm').classList.remove('show');
                document.getElementById('gerantForm').classList.add('show');
                document.getElementById('roleField').value = 'gerant';
            }
        }

        selectRole('vendeur');
    </script>
</body>
</html>
