{% extends "gerant/base_gerant.html" %}

{% block title %}Vente{% endblock %}
{% block page_title %}💰 Vente{% endblock %}

{% block extra_css %}
<style>
    .mode-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }
    .mode-btn {
        flex: 1;
        padding: 12px;
        background: #6b7280;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }
    .mode-btn.active {
        background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
    }
    .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 5px;
        color: #4a5568;
    }
    .form-group input, .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
    }
    .panier-container {
        background: #f8fafc;
        border-radius: 15px;
        padding: 20px;
        margin-top: 20px;
    }
    .panier-item {
        background: white;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid #1e3a8a;
    }
    .panier-total {
        background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
        color: white;
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
        text-align: center;
    }
    .btn-danger {
        background: #e74c3c;
    }
    @media (max-width: 768px) {
        .grid-2 {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <div id="venteMessage"></div>
    
    <div class="mode-buttons">
        <button id="modeUniqueBtn" class="mode-btn active" onclick="setModeVente('unique')">🛒 Vente unique</button>
        <button id="modeMultipleBtn" class="mode-btn" onclick="setModeVente('multiple')">🛍️ Vente multiple (Panier)</button>
    </div>
    
    <!-- Mode Vente Unique -->
    <div id="modeUnique">
        <div class="grid-2">
            <div class="form-group">
                <label>📦 Produit</label>
                <select id="produitVente" onchange="updateProduitInfo()">
                    <option value="">Sélectionnez</option>
                </select>
            </div>
            <div class="form-group">
                <label>💰 Prix unitaire</label>
                <input type="text" id="prixUnitaireVente" readonly>
            </div>
            <div class="form-group">
                <label>📊 Stock disponible</label>
                <input type="text" id="stockDispoVente" readonly>
            </div>
            <div class="form-group">
                <label>🔢 Quantité</label>
                <input type="number" id="quantiteVente" min="1" value="1" oninput="calculerTotalVente()">
            </div>
            <div class="form-group">
                <label>💵 Prix vendu</label>
                <input type="number" id="prixVenduVente" step="1" oninput="calculerTotalVente()">
            </div>
            <div class="form-group">
                <label>📝 Sous-total</label>
                <input type="text" id="sousTotalVente" readonly>
            </div>
        </div>
        <div class="form-group">
            <label>🎁 Remise (FCFA)</label>
            <input type="number" id="remiseVente" value="0" oninput="calculerTotalApresRemiseVente()">
        </div>
        <div class="form-group">
            <label>💰 Total après remise</label>
            <input type="text" id="totalApresRemiseVente" readonly style="font-size:20px; font-weight:bold; color:#27ae60;">
        </div>
        <button onclick="validerVente()" style="width:100%">✅ Valider la vente</button>
    </div>
    
    <!-- Mode Vente Multiple (Panier) -->
    <div id="modeMultiple" style="display:none;">
        <div class="grid-2">
            <div class="form-group">
                <label>📦 Produit</label>
                <select id="produitPanier" onchange="updateProduitPanierInfo()">
                    <option value="">Sélectionnez</option>
                </select>
            </div>
            <div class="form-group">
                <label>💰 Prix unitaire</label>
                <input type="text" id="prixUnitairePanier" readonly>
            </div>
            <div class="form-group">
                <label>📊 Stock disponible</label>
                <input type="text" id="stockDispoPanier" readonly>
            </div>
            <div class="form-group">
                <label>🔢 Quantité</label>
                <input type="number" id="quantitePanier" min="1" value="1" oninput="calculerSousTotalPanier()">
            </div>
            <div class="form-group">
                <label>💵 Prix vendu</label>
                <input type="number" id="prixVenduPanier" step="1" oninput="calculerSousTotalPanier()">
            </div>
            <div class="form-group">
                <label>📝 Sous-total</label>
                <input type="text" id="sousTotalPanier" readonly>
            </div>
        </div>
        <button onclick="ajouterAuPanier()" style="width:100%; margin-bottom:15px;">➕ Ajouter au panier</button>
        
        <div class="panier-container">
            <h3>🛒 Panier en cours</h3>
            <div id="panierItems"></div>
            <div class="panier-total">
                <div>Total du panier</div>
                <h3 id="panierTotal">0 FCFA</h3>
            </div>
            <div class="form-group" style="margin-top:15px;">
                <label>🎁 Remise globale (FCFA)</label>
                <input type="number" id="remiseGlobale" value="0" oninput="calculerTotalPanierApresRemise()">
            </div>
            <div class="form-group">
                <label>💰 Total après remise</label>
                <input type="text" id="totalPanierApresRemise" readonly style="font-size:20px; font-weight:bold; color:#27ae60;">
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="validerPanier()">✅ Valider toute la vente</button>
                <button onclick="viderPanier()" class="btn-danger">🗑️ Vider le panier</button>
            </div>
        </div>
    </div>
</div>

<script>
    let produits = [];
    let panier = [];
    
    async function chargerProduits() {
        try {
            const response = await fetch('/api/caisse/produits');
            produits = await response.json();
            const selectUnique = document.getElementById('produitVente');
            const selectPanier = document.getElementById('produitPanier');
            if (selectUnique) {
                selectUnique.innerHTML = '<option value="">Sélectionnez</option>';
                produits.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.nom;
                    opt.textContent = `${p.nom} (Stock: ${p.stock})`;
                    selectUnique.appendChild(opt);
                });
            }
            if (selectPanier) {
                selectPanier.innerHTML = '<option value="">Sélectionnez</option>';
                produits.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.nom;
                    opt.textContent = `${p.nom} (Stock: ${p.stock})`;
                    selectPanier.appendChild(opt);
                });
            }
        } catch(e) { console.error(e); }
    }
    
    function updateProduitInfo() {
        const p = produits.find(p => p.nom === document.getElementById('produitVente').value);
        if (p) {
            document.getElementById('prixUnitaireVente').value = p.prixFixe;
            document.getElementById('stockDispoVente').value = p.stock;
            document.getElementById('prixVenduVente').value = p.prixFixe;
            document.getElementById('quantiteVente').value = 1;
            calculerTotalVente();
        }
    }
    
    function calculerTotalVente() {
        const qte = parseFloat(document.getElementById('quantiteVente').value) || 0;
        const prix = parseFloat(document.getElementById('prixVenduVente').value) || 0;
        document.getElementById('sousTotalVente').value = (qte * prix).toFixed(0) + ' FCFA';
        const st = parseFloat(document.getElementById('sousTotalVente').value) || 0;
        const rem = parseFloat(document.getElementById('remiseVente').value) || 0;
        document.getElementById('totalApresRemiseVente').value = Math.max(0, st - rem).toFixed(0) + ' FCFA';
    }
    
    function calculerTotalApresRemiseVente() {
        const st = parseFloat(document.getElementById('sousTotalVente').value) || 0;
        const rem = parseFloat(document.getElementById('remiseVente').value) || 0;
        document.getElementById('totalApresRemiseVente').value = Math.max(0, st - rem).toFixed(0) + ' FCFA';
    }
    
    async function validerVente() {
        const produit = document.getElementById('produitVente').value;
        const quantite = parseInt(document.getElementById('quantiteVente').value);
        const prixVendu = parseFloat(document.getElementById('prixVenduVente').value);
        const remise = parseFloat(document.getElementById('remiseVente').value) || 0;
        if (!produit || !quantite || !prixVendu) { showMessage('venteMessage', '❌ Remplissez tous les champs', 'error'); return; }
        try {
            const res = await fetch('/api/caisse/vente', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ produit, quantite, prixVendu, remise }) });
            const result = await res.json();
            if (result.success) {
                showMessage('venteMessage', `✅ Vente enregistrée! Total: ${result.total} FCFA`, 'success');
                document.getElementById('quantiteVente').value = 1;
                document.getElementById('remiseVente').value = 0;
                calculerTotalVente();
                chargerProduits();
            } else { showMessage('venteMessage', `❌ ${result.error}`, 'error'); }
        } catch(e) { showMessage('venteMessage', '❌ Erreur', 'error'); }
    }
    
    function setModeVente(mode) {
        if (mode === 'unique') {
            document.getElementById('modeUnique').style.display = 'block';
            document.getElementById('modeMultiple').style.display = 'none';
            document.getElementById('modeUniqueBtn').classList.add('active');
            document.getElementById('modeMultipleBtn').classList.remove('active');
        } else {
            document.getElementById('modeUnique').style.display = 'none';
            document.getElementById('modeMultiple').style.display = 'block';
            document.getElementById('modeUniqueBtn').classList.remove('active');
            document.getElementById('modeMultipleBtn').classList.add('active');
        }
    }
    
    function updateProduitPanierInfo() {
        const p = produits.find(p => p.nom === document.getElementById('produitPanier').value);
        if (p) {
            document.getElementById('prixUnitairePanier').value = p.prixFixe;
            document.getElementById('stockDispoPanier').value = p.stock;
            document.getElementById('prixVenduPanier').value = p.prixFixe;
            document.getElementById('quantitePanier').value = 1;
            calculerSousTotalPanier();
        }
    }
    
    function calculerSousTotalPanier() {
        const qte = parseFloat(document.getElementById('quantitePanier').value) || 0;
        const prix = parseFloat(document.getElementById('prixVenduPanier').value) || 0;
        document.getElementById('sousTotalPanier').value = (qte * prix).toFixed(0) + ' FCFA';
    }
    
    function ajouterAuPanier() {
        const produit = document.getElementById('produitPanier').value;
        const quantite = parseInt(document.getElementById('quantitePanier').value);
        const prixVendu = parseFloat(document.getElementById('prixVenduPanier').value);
        const stock = parseInt(document.getElementById('stockDispoPanier').value);
        if (!produit || !quantite || !prixVendu) { showMessage('venteMessage', '❌ Remplissez tous les champs', 'error'); return; }
        if (quantite > stock) { showMessage('venteMessage', '❌ Stock insuffisant!', 'error'); return; }
        const existant = panier.find(i => i.produit === produit);
        if (existant) { existant.quantite += quantite; existant.sousTotal = existant.quantite * existant.prixVendu; }
        else { panier.push({ produit, quantite, prixVendu, sousTotal: quantite * prixVendu }); }
        document.getElementById('produitPanier').value = '';
        document.getElementById('quantitePanier').value = 1;
        document.getElementById('prixVenduPanier').value = '';
        document.getElementById('sousTotalPanier').value = '';
        afficherPanier();
        showMessage('venteMessage', '✅ Produit ajouté au panier!', 'success');
    }
    
    function afficherPanier() {
        const container = document.getElementById('panierItems');
        if (panier.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999;">Panier vide</p>';
            document.getElementById('panierTotal').innerHTML = '0 FCFA';
            document.getElementById('remiseGlobale').value = 0;
            document.getElementById('totalPanierApresRemise').value = '0 FCFA';
            return;
        }
        let total = 0, html = '';
        panier.forEach((item, idx) => {
            total += item.sousTotal;
            html += `<div class="panier-item"><div><strong>${escapeHtml(item.produit)}</strong><br>${item.quantite} × ${item.prixVendu.toLocaleString()} FCFA</div><div>${item.sousTotal.toLocaleString()} FCFA</div><button onclick="retirerDuPanier(${idx})" style="background:#e74c3c; padding:5px 10px;">🗑️</button></div>`;
        });
        container.innerHTML = html;
        document.getElementById('panierTotal').innerHTML = total.toLocaleString() + ' FCFA';
        calculerTotalPanierApresRemise();
    }
    
    function retirerDuPanier(idx) { panier.splice(idx, 1); afficherPanier(); }
    function viderPanier() { if (confirm('Vider le panier ?')) { panier = []; afficherPanier(); } }
    
    function calculerTotalPanierApresRemise() {
        let total = panier.reduce((s, i) => s + i.sousTotal, 0);
        const rem = parseFloat(document.getElementById('remiseGlobale').value) || 0;
        document.getElementById('totalPanierApresRemise').value = Math.max(0, total - rem).toLocaleString() + ' FCFA';
    }
    
    async function validerPanier() {
        if (panier.length === 0) { showMessage('venteMessage', '❌ Panier vide', 'error'); return; }
        const remGlob = parseFloat(document.getElementById('remiseGlobale').value) || 0;
        let total = panier.reduce((s, i) => s + i.sousTotal, 0);
        let success = true, totalVente = 0;
        for (const item of panier) {
            const prop = total > 0 ? item.sousTotal / total : 0;
            const remItem = Math.round(remGlob * prop);
            try {
                const res = await fetch('/api/caisse/vente', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ produit: item.produit, quantite: item.quantite, prixVendu: item.prixVendu, remise: remItem }) });
                const result = await res.json();
                if (!result.success) { showMessage('venteMessage', `❌ Erreur sur ${item.produit}`, 'error'); success = false; break; }
                totalVente += result.total;
            } catch(e) { showMessage('venteMessage', '❌ Erreur', 'error'); success = false; break; }
        }
        if (success) {
            showMessage('venteMessage', `✅ Panier validé! Total: ${totalVente.toLocaleString()} FCFA`, 'success');
            panier = []; afficherPanier(); chargerProduits();
        }
    }
    
    chargerProduits();
</script>
{% endblock %}
